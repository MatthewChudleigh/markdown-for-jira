name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - name: Install root deps
        run: npm install --no-audit --no-fund
      - name: Install panel deps
        run: npm install --no-audit --no-fund --prefix static/panel
      - name: Lint
        run: npm run lint
      - name: Test
        run: npm test
      - name: Build panel
        run: npm run build
      - name: Check bundle size
        run: |
          size=$(du -sb static/panel/dist | cut -f1)
          echo "Bundle size: $size bytes"
          if [ "$size" -gt 2000000 ]; then
            echo "Bundle exceeds 2 MB — investigate (gzipped ceiling is 600 KB)."
            exit 1
          fi
